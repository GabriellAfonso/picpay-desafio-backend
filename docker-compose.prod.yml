services:
  picpay_django:
    container_name: picpay-server
    build:
      context: .
    image: django-picpay:prod
    command:
      - sh
      - -c
      - |
        python manage.py collectstatic --noinput &&
        python manage.py migrate --noinput &&
        gunicorn core.wsgi:application \
          --bind 0.0.0.0:8000 \
          --workers 3 \
          --timeout 60 \
          --access-logfile - \
          --error-logfile -
    env_file:
      - ./dotenv_files/.env
    networks:
      - proxy-network
    depends_on:
      picpay_db:
        condition: service_healthy
    restart: unless-stopped

  picpay_db:
    container_name: picpay-db
    image: postgres:17-alpine
    volumes:
      - database:/var/lib/postgresql/data/
    env_file:
      - ./dotenv_files/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - proxy-network
    restart: unless-stopped

networks:
  proxy-network:
    external: true

volumes:
  database:
